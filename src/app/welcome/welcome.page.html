<ion-header [translucent]="true">
  <ion-toolbar color="translucent">

  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-content ion-padding">
  <div class="welcome-wrapper">

    <ion-img src="../../assets/images/splash-text.svg"
      alt="byte && bite logo font" class="img" draggable="false">
    </ion-img>

    <div class="terms-item">
      <ion-item lines="none" class="terms-item">
        <ion-checkbox slot="start" mode="md"></ion-checkbox>
        <ion-label class="ion-text-nowrap"><a href="#">I accept the terms and conditions</a></ion-label>
      </ion-item>
    </div>

    <ion-button expand="block" class="ion-margin-top" color="medium" (click)="goToHome()">
      Start
    </ion-button>
  </div>
</ion-content>
