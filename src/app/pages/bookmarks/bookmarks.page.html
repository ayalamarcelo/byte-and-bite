<ion-content class="bookmarks-content">

  <!-- Buscador -->
  <div class="search-container">
    <ion-searchbar placeholder="Buscar alimentos..." animated></ion-searchbar>
  </div>

  <!-- Filtros -->
  <div class="filter-buttons">
    <ion-button fill="outline" size="small" shape="round">Todos</ion-button>
    <ion-button fill="outline" size="small" shape="round">Carbohidratos</ion-button>
    <ion-button fill="outline" size="small" shape="round">Proteínas</ion-button>
    <ion-button fill="outline" size="small" shape="round">Grasas</ion-button>
    <ion-button fill="outline" size="small" shape="round">Vitaminas</ion-button>
  </div>

  <!-- Empty state -->
  <div class="empty-state">
    <ion-icon name="bookmark-outline"></ion-icon>
    <p>Guardá tus alimentos favoritos y accedé a ellos cuando quieras</p>
  </div>

  <!-- Lista de alimentos -->
  <ion-list class="bookmarks-list">

    <ion-card class="bookmark-card">
      <img src="https://images.unsplash.com/photo-1523049673857-eb18f1d7b578?w=400&h=200&fit=crop" alt="Palta">
      <div class="card-badge">Grasas</div>
      <ion-card-content>
        <div class="card-info">
          <h3>Palta</h3>
          <div class="card-meta">
            <span class="calories">🔥 160 kcal</span>
            <span class="separator">·</span>
            <span>100g</span>
          </div>
        </div>
        <ion-button fill="clear" class="remove-btn">
          <ion-icon slot="icon-only" name="bookmark" color="primary"></ion-icon>
        </ion-button>
      </ion-card-content>
    </ion-card>

    <ion-card class="bookmark-card">
      <img src="https://images.unsplash.com/photo-1536304993881-ff6e9eefa2a6?w=400&h=200&fit=crop" alt="Arroz integral">
      <div class="card-badge">Carbohidratos</div>
      <ion-card-content>
        <div class="card-info">
          <h3>Arroz integral</h3>
          <div class="card-meta">
            <span class="calories">🔥 130 kcal</span>
            <span class="separator">·</span>
            <span>100g</span>
          </div>
        </div>
        <ion-button fill="clear" class="remove-btn">
          <ion-icon slot="icon-only" name="bookmark" color="primary"></ion-icon>
        </ion-button>
      </ion-card-content>
    </ion-card>

    <ion-card class="bookmark-card">
      <img src="https://images.unsplash.com/photo-1532550907401-a500c9a57435?w=400&h=200&fit=crop" alt="Pechuga de pollo">
      <div class="card-badge">Proteínas</div>
      <ion-card-content>
        <div class="card-info">
          <h3>Pechuga de pollo</h3>
          <div class="card-meta">
            <span class="calories">🔥 165 kcal</span>
            <span class="separator">·</span>
            <span>100g</span>
          </div>
        </div>
        <ion-button fill="clear" class="remove-btn">
          <ion-icon slot="icon-only" name="bookmark" color="primary"></ion-icon>
        </ion-button>
      </ion-card-content>
    </ion-card>

  </ion-list>

</ion-content>
