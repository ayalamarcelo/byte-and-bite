<ion-header>
  <ion-toolbar>
    <ion-title>Bookmarks</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="bookmarks-content">

  <div class="bookmarks-header">
    <h2>Mis guardados</h2>
    <p>Tus recetas saludables favoritas en un solo lugar</p>
  </div>

  <!-- Empty state -->
  <div class="empty-state">
    <ion-icon name="bookmark-outline"></ion-icon>
    <p>Guardá tus recetas saludables favoritas y accedé a ellas cuando quieras</p>
  </div>

  <!-- Lista de bookmarks -->
  <ion-list class="bookmarks-list">

    <ion-card class="bookmark-card">
      <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=400&h=200&fit=crop" alt="Receta">
      <div class="card-badge">Desayuno</div>
      <ion-card-content>
        <div class="card-info">
          <h3>Nombre de la receta</h3>
          <div class="card-meta">
            <span class="calories">🔥 450 kcal</span>
            <span class="separator">·</span>
            <span>20 min</span>
          </div>
        </div>
        <ion-button fill="clear" class="remove-btn">
          <ion-icon slot="icon-only" name="bookmark" color="primary"></ion-icon>
        </ion-button>
      </ion-card-content>
    </ion-card>

    <ion-card class="bookmark-card">
      <img src="https://images.unsplash.com/photo-1547592180-85f173990554?w=400&h=200&fit=crop" alt="Receta">
      <div class="card-badge">Almuerzo</div>
      <ion-card-content>
        <div class="card-info">
          <h3>Otra receta guardada</h3>
          <div class="card-meta">
            <span class="calories">🔥 320 kcal</span>
            <span class="separator">·</span>
            <span>35 min</span>
          </div>
        </div>
        <ion-button fill="clear" class="remove-btn">
          <ion-icon slot="icon-only" name="bookmark" color="primary"></ion-icon>
        </ion-button>
      </ion-card-content>
    </ion-card>

  </ion-list>

</ion-content>
